name: 'Lint Code'

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  lint_python:
    name: Lint Python (flake8)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install flake8
        run: pip install flake8

      - name: Lint Django app with flake8
        run: flake8 --exclude=migrations server/djangoapp
